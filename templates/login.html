<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <form method="POST"
          class="auth-form">

        <h1>Smart Insole AI</h1>

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">

            Login

        </button>

        <p>

            No account?

            <a href="/register">

                Register

            </a>

        </p>

    </form>

</div>

</body>
</html>
