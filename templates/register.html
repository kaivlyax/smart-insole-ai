<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

<form method="POST"
      class="auth-form">

    <h1>Create Account</h1>

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">

        Register

    </button>

</form>

</div>

</body>
</html>
